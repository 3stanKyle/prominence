<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prominence</title>
  <style>
    :root {
      --color-green: #4caf50;
      --color-yellow: #ff9800;
      --color-red: #f44336;
      --color-bar-bg: #2a2a40;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      background: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
      padding: 16px;
      user-select: none;
    }
    .container {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }
    .header {
      text-align: center;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #a0a0c0;
    }
    .error-msg {
      text-align: center;
      font-size: 12px;
      color: #808090;
      padding: 8px 0;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #808090;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .bucket-row {
      margin-bottom: 10px;
    }
    .bucket-row:last-child {
      margin-bottom: 0;
    }
    .bucket-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .bucket-name {
      font-size: 12px;
      font-weight: 600;
      color: #c0c0d0;
    }
    .bucket-pct {
      font-size: 11px;
      color: #808090;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--color-bar-bg);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .reset-countdown {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #2a2a40;
      text-align: center;
      font-size: 12px;
      color: #808090;
    }
    .section-divider {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #2a2a40;
    }
    .extra-usage {
      font-size: 12px;
      color: #c0c0d0;
    }
    .extra-usage-disabled {
      font-size: 12px;
      color: #808090;
    }
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #2a2a40;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .last-updated {
      font-size: 10px;
      color: #606070;
    }
    .refresh-btn {
      background: #2a2a40;
      border: 1px solid #3a3a50;
      border-radius: 4px;
      color: #a0a0c0;
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .refresh-btn:hover {
      background: #3a3a50;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Prominence</h1>
    </div>
    <div id="usage-content">
      <p class="error-msg">Usage data loading...</p>
    </div>
  </div>
  <script>
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.close();
      }
    });

    function getBarColor(pct) {
      if (pct >= 85) return 'var(--color-red)';
      if (pct >= 60) return 'var(--color-yellow)';
      return 'var(--color-green)';
    }

    function renderUsageData(data) {
      const container = document.getElementById('usage-content');
      if (!data || !data.buckets || data.buckets.length === 0) {
        container.innerHTML = '<p class="error-msg">Unable to fetch usage data</p>';
        return;
      }

      let html = '<div class="section-title">Usage Limits</div>';

      for (const bucket of data.buckets) {
        const pct = Math.min(bucket.utilization, 100);
        const color = getBarColor(pct);

        html += `
          <div class="bucket-row">
            <div class="bucket-label">
              <span class="bucket-name">${bucket.label}</span>
              <span class="bucket-pct">${pct.toFixed(0)}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${pct}%; background: ${color};"></div>
            </div>
          </div>
        `;
      }

      // Reset countdown from the first bucket with a reset time
      const firstReset = data.buckets.find(b => b.resetsAt);
      html += '<div id="reset-countdown" class="reset-countdown">';
      if (firstReset && firstReset.resetsAt) {
        html += formatCountdown(firstReset.resetsAt);
        window._resetTime = firstReset.resetsAt;
      } else {
        html += 'Reset time unavailable';
        window._resetTime = null;
      }
      html += '</div>';

      // Extra usage section
      if (data.extraUsage) {
        html += '<div class="section-divider">';
        html += '<div class="section-title">Extra Usage</div>';
        html += `<p class="extra-usage">$${data.extraUsage.usedCredits.toFixed(2)} / $${data.extraUsage.monthlyLimit.toFixed(0)} monthly</p>`;
        html += '</div>';
      }

      // Footer
      html += '<div class="footer">';
      html += '<span id="last-updated" class="last-updated">Updated just now</span>';
      html += '<button id="refresh-btn" class="refresh-btn" onclick="handleRefreshClick()">Refresh</button>';
      html += '</div>';

      container.innerHTML = html;
    }

    function formatCountdown(isoDate) {
      const target = new Date(isoDate);
      if (isNaN(target.getTime())) return 'Reset time unavailable';

      const diff = target.getTime() - Date.now();
      if (diff <= 0) return 'Resets soon';

      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);

      let parts = [];
      if (days > 0) parts.push(days + 'd');
      if (hours > 0) parts.push(hours + 'h');
      parts.push(minutes + 'm');

      return 'Resets in ' + parts.join(' ');
    }

    function updateCountdown() {
      const el = document.getElementById('reset-countdown');
      if (!el || !window._resetTime) return;
      el.textContent = formatCountdown(window._resetTime);
    }

    window._lastUpdatedAt = null;
    window._resetTime = null;

    function updateLastUpdatedText() {
      const el = document.getElementById('last-updated');
      if (!el || !window._lastUpdatedAt) return;
      const diffMs = Date.now() - window._lastUpdatedAt;
      const mins = Math.floor(diffMs / 60000);
      if (mins < 1) {
        el.textContent = 'Updated just now';
      } else {
        el.textContent = 'Updated ' + mins + ' min ago';
      }
    }

    async function loadUsageData() {
      try {
        const data = await window.prominenceAPI.getUsageData();
        renderUsageData(data);
        window._lastUpdatedAt = Date.now();
      } catch {
        renderUsageData(null);
      }
    }

    async function handleRefreshClick() {
      const btn = document.getElementById('refresh-btn');
      if (btn) btn.textContent = '...';
      await window.prominenceAPI.requestRefresh();
      if (btn) btn.textContent = 'Refresh';
    }

    // Load on startup
    loadUsageData();

    // Update countdown and last-updated text every 60 seconds
    setInterval(() => {
      updateCountdown();
      updateLastUpdatedText();
    }, 60000);

    // Listen for push updates from main process
    window.prominenceAPI.onUsageDataUpdated((data) => {
      renderUsageData(data);
      window._lastUpdatedAt = Date.now();
    });
  </script>
</body>
</html>
