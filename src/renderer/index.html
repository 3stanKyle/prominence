<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prominence</title>
  <style>
    :root {
      --color-green: #4caf50;
      --color-yellow: #ff9800;
      --color-red: #f44336;
      --color-bar-bg: #2a2a40;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      background: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
      padding: 16px;
      user-select: none;
    }
    .container {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }
    .header {
      text-align: center;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #a0a0c0;
    }
    .error-msg {
      text-align: center;
      font-size: 12px;
      color: #808090;
      padding: 8px 0;
    }
    .model-row {
      margin-bottom: 10px;
    }
    .model-row:last-child {
      margin-bottom: 0;
    }
    .model-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .model-name {
      font-size: 12px;
      font-weight: 600;
      color: #c0c0d0;
    }
    .model-count {
      font-size: 11px;
      color: #808090;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--color-bar-bg);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .reset-countdown {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #2a2a40;
      text-align: center;
      font-size: 12px;
      color: #808090;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #808090;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .section-divider {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #2a2a40;
    }
    .session-info {
      font-size: 12px;
      color: #c0c0d0;
    }
    .session-unavailable {
      font-size: 12px;
      color: #808090;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Prominence</h1>
    </div>
    <div id="usage-content">
      <p class="error-msg">Usage data loading...</p>
    </div>
  </div>
  <script>
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.close();
      }
    });

    function getBarColor(ratio) {
      if (ratio >= 0.85) return 'var(--color-red)';
      if (ratio >= 0.60) return 'var(--color-yellow)';
      return 'var(--color-green)';
    }

    function renderUsageData(data) {
      const container = document.getElementById('usage-content');
      if (!data || !data.models || data.models.length === 0) {
        container.innerHTML = '<p class="error-msg">Unable to fetch usage data</p>';
        return;
      }

      let html = '<div class="section-title">Weekly Usage</div>';
      for (const model of data.models) {
        const ratio = model.limit > 0 ? model.used / model.limit : 0;
        const pct = Math.min(ratio * 100, 100).toFixed(1);
        const color = getBarColor(ratio);

        html += `
          <div class="model-row">
            <div class="model-label">
              <span class="model-name">${model.name}</span>
              <span class="model-count">${model.used} / ${model.limit}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${pct}%; background: ${color};"></div>
            </div>
          </div>
        `;
      }

      // Add reset countdown section
      const resetTime = data.models[0] && data.models[0].resetTime;
      html += '<div id="reset-countdown" class="reset-countdown">';
      html += resetTime ? formatCountdown(resetTime) : 'Reset time unavailable';
      html += '</div>';

      // Add current session section
      html += '<div class="section-divider">';
      html += '<div class="section-title">Current Session</div>';
      if (data.session && (data.session.used > 0 || data.session.limit > 0)) {
        const sessionRatio = data.session.limit > 0 ? data.session.used / data.session.limit : 0;
        const sessionPct = Math.min(sessionRatio * 100, 100).toFixed(1);
        const sessionColor = getBarColor(sessionRatio);
        html += `
          <div class="model-row">
            <div class="model-label">
              <span class="model-name">Messages</span>
              <span class="model-count">${data.session.used} / ${data.session.limit}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${sessionPct}%; background: ${sessionColor};"></div>
            </div>
          </div>
        `;
      } else {
        html += '<p class="session-unavailable">Session data not available</p>';
      }
      html += '</div>';

      container.innerHTML = html;

      // Store reset time for interval updates
      window._resetTime = resetTime || null;
    }

    function parseResetTime(resetTime) {
      // Try ISO date string first
      const asDate = new Date(resetTime);
      if (!isNaN(asDate.getTime())) {
        return asDate;
      }
      // Try relative format like "3d 2h 15m"
      const parts = resetTime.match(/(\d+)\s*d/i);
      const hours = resetTime.match(/(\d+)\s*h/i);
      const mins = resetTime.match(/(\d+)\s*m/i);
      if (parts || hours || mins) {
        const totalMs =
          ((parts ? parseInt(parts[1], 10) : 0) * 86400000) +
          ((hours ? parseInt(hours[1], 10) : 0) * 3600000) +
          ((mins ? parseInt(mins[1], 10) : 0) * 60000);
        return new Date(Date.now() + totalMs);
      }
      return null;
    }

    function formatCountdown(resetTime) {
      const target = parseResetTime(resetTime);
      if (!target) return 'Reset time unavailable';

      const diff = target.getTime() - Date.now();
      if (diff <= 0) return 'Resets soon';

      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);

      let parts = [];
      if (days > 0) parts.push(days + 'd');
      if (hours > 0) parts.push(hours + 'h');
      parts.push(minutes + 'm');

      return 'Resets in ' + parts.join(' ');
    }

    function updateCountdown() {
      const el = document.getElementById('reset-countdown');
      if (!el || !window._resetTime) return;
      el.textContent = formatCountdown(window._resetTime);
    }

    async function loadUsageData() {
      try {
        const data = await window.prominenceAPI.getUsageData();
        renderUsageData(data);
      } catch {
        renderUsageData(null);
      }
    }

    // Initialize reset time storage
    window._resetTime = null;

    // Load on startup
    loadUsageData();

    // Update countdown every 60 seconds
    setInterval(updateCountdown, 60000);

    // Listen for push updates from main process
    window.prominenceAPI.onUsageDataUpdated((data) => {
      renderUsageData(data);
    });
  </script>
</body>
</html>
