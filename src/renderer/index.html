<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prominence</title>
  <style>
    :root {
      --color-green: #4caf50;
      --color-yellow: #ff9800;
      --color-red: #f44336;
      --color-bar-bg: #2a2a40;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      background: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
      padding: 16px;
      user-select: none;
    }
    .container {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }
    .header {
      text-align: center;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #a0a0c0;
    }
    .error-msg {
      text-align: center;
      font-size: 12px;
      color: #808090;
      padding: 8px 0;
    }
    .model-row {
      margin-bottom: 10px;
    }
    .model-row:last-child {
      margin-bottom: 0;
    }
    .model-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .model-name {
      font-size: 12px;
      font-weight: 600;
      color: #c0c0d0;
    }
    .model-count {
      font-size: 11px;
      color: #808090;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--color-bar-bg);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Prominence</h1>
    </div>
    <div id="usage-content">
      <p class="error-msg">Usage data loading...</p>
    </div>
  </div>
  <script>
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.close();
      }
    });

    function getBarColor(ratio) {
      if (ratio >= 0.85) return 'var(--color-red)';
      if (ratio >= 0.60) return 'var(--color-yellow)';
      return 'var(--color-green)';
    }

    function renderUsageData(data) {
      const container = document.getElementById('usage-content');
      if (!data || !data.models || data.models.length === 0) {
        container.innerHTML = '<p class="error-msg">Unable to fetch usage data</p>';
        return;
      }

      let html = '';
      for (const model of data.models) {
        const ratio = model.limit > 0 ? model.used / model.limit : 0;
        const pct = Math.min(ratio * 100, 100).toFixed(1);
        const color = getBarColor(ratio);

        html += `
          <div class="model-row">
            <div class="model-label">
              <span class="model-name">${model.name}</span>
              <span class="model-count">${model.used} / ${model.limit}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${pct}%; background: ${color};"></div>
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    async function loadUsageData() {
      try {
        const data = await window.prominenceAPI.getUsageData();
        renderUsageData(data);
      } catch {
        renderUsageData(null);
      }
    }

    // Load on startup
    loadUsageData();

    // Listen for push updates from main process
    window.prominenceAPI.onUsageDataUpdated((data) => {
      renderUsageData(data);
    });
  </script>
</body>
</html>
